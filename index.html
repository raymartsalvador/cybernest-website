<!DOCTYPE html>
<html lang="en-PH">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/cybernest-apple-touch.png" />

    <!-- Google Analytics (GA4) — Consent Mode v2, default-denied.
         gtag.js loads, but no storage is written and no measurement call fires until
         the ConsentBanner calls gtag('consent','update',...) after the user consents.
         Required by RA 10173 (NPC treats GA4 client ID + IP as personal info) and by
         GDPR ePrivacy for EU visitors. See /src/components/ConsentBanner.tsx. -->
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://www.google-analytics.com" crossorigin />
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        'analytics_storage': 'denied',
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'functionality_storage': 'granted',
        'security_storage': 'granted',
        'wait_for_update': 500
      });
      gtag('js', new Date());
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z6PMNMXP7W"></script>
    
    <!-- Primary Meta Tags (default — per-route values injected by react-helmet-async via src/components/Seo.tsx) -->
    <title>Cybernest Solutions — Workflow Automation & Digital Transformation</title>
    <meta
      name="description"
      content="Cybernest builds workflow automation, queueing, and digital transformation solutions for Philippine businesses and government offices."
    />
    <meta name="author" content="Cybernest Solutions" />

    <!-- OG / Twitter fallback image (static — used by crawlers that don't execute JS:
         Facebook, LinkedIn, Slack, Discord, iMessage. Per-route helmet overrides still
         apply for JS-capable crawlers like Googlebot.) -->
    <meta property="og:image" content="https://www.cybernestsolution.com/og-cybernest-banner.png" />
    <meta property="og:image:secure_url" content="https://www.cybernestsolution.com/og-cybernest-banner.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Cybernest Solutions — workflow automation and digital transformation for the Philippines" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://www.cybernestsolution.com/og-cybernest-banner.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
      media="print" onload="this.media='all'"
    />
    
    <!-- Sitemap reference -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    
    <!-- Robots -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />

  </head>
