<!DOCTYPE html>
<html lang="en-PH">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/cybernest.png" />
    <link rel="apple-touch-icon" href="/cybernest-apple-touch.png" />
    
    <!-- Primary Meta Tags (default — per-route values injected by react-helmet-async via src/components/Seo.tsx) -->
    <title>Cybernest Solutions — Workflow Automation & Digital Transformation</title>
    <meta
      name="description"
      content="Cybernest builds workflow automation, queueing, and digital transformation solutions for Philippine businesses and government offices."
    />
    <meta name="author" content="Cybernest Solutions" />

    <!-- OG image dimensions (static — used across all routes) -->
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
      media="print" onload="this.media='all'"
    />
    
    <!-- Sitemap reference -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    
    <!-- Robots -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Structured Data: Organization + WebSite (global, per-route Product/Breadcrumb schema injected via Seo component) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.cybernestsolution.com/#organization",
          "name": "Cybernest Solutions",
          "url": "https://www.cybernestsolution.com/",
          "logo": "https://www.cybernestsolution.com/cybernest.png",
          "description": "Cybernest builds workflow automation, queueing, and digital transformation solutions for Philippine businesses and government offices.",
          "email": "cns@cybernestsolution.com",
          "sameAs": [
            "https://www.facebook.com/CybernestSolutions"
          ],
          "contactPoint": [
            {
              "@type": "ContactPoint",
              "telephone": "+63-976-179-1990",
              "contactType": "customer support",
              "areaServed": "PH",
              "availableLanguage": ["en", "fil"]
            },
            {
              "@type": "ContactPoint",
              "telephone": "+63-928-901-0072",
              "contactType": "sales",
              "areaServed": "PH",
              "availableLanguage": ["en", "fil"]
            }
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://www.cybernestsolution.com/#website",
          "url": "https://www.cybernestsolution.com/",
          "name": "Cybernest Solutions",
          "publisher": { "@id": "https://www.cybernestsolution.com/#organization" },
          "inLanguage": "en-PH"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Preconnect to analytics -->
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://www.google-analytics.com" />
  </body>
</html>
